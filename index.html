<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Mar-bot</h1>
        <div class="burgerMenu">
            <button class="burgerButton">≡</button>
            <div class="burgerContent">
                <a href="https://github.com/LuisReyes970304/Ia_project/blob/main/README.md" target="_blank">Documentation</a>
                <a href="https://ollama.com/library/llama3.2" target="_blank">moddle required</a>
            </div>
        </div>
    </header>
    <main>
        <div class="agentAi">
            <div class="screenAi"></div>
            <form id="formAi" action="/submit-query" method="post">
                <div class="divInput">
                    <textarea name="inputChat" id="inputChat" placeholder="Write here your prompt"></textarea>
                </div>
                <div class="divButton">
                    <button type="submit" class="submitBtn">&#8250;</button>
                </div>
            </form>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="dashboard.js"></script>
</body>

</html>
